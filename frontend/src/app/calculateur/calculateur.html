<div class="calculateur-section">
  <div class="container reveal visible">
    <div class="header-content text-center">
      <h2 class="text-gradient">Outils de Santé</h2>
      <p class="subtitle">Evaluez vos besoins nutritionnels et votre condition physique en quelques secondes.</p>
    </div>

    <div class="calculator-wrapper glass-card">
      <div class="tabs">
        <button [class.active]="activeTab === 'bmi'" (click)="setTab('bmi')">Calculateur IMC</button>
        <button [class.active]="activeTab === 'calories'" (click)="setTab('calories')">Calculateur Calories</button>
      </div>

      <!-- BMI Calculator -->
      <div class="calculator-content" *ngIf="activeTab === 'bmi'">
        <div class="form-grid">
          <div class="input-group">
            <label>Poids (kg)</label>
            <input type="number" [(ngModel)]="bmiWeight" placeholder="Ex: 70" (input)="calculateBMI()">
          </div>
          <div class="input-group">
            <label>Taille (cm)</label>
            <input type="number" [(ngModel)]="bmiHeight" placeholder="Ex: 175" (input)="calculateBMI()">
          </div>
        </div>

        <div class="result-card" *ngIf="bmiResult">
          <h3>Votre IMC : <span>{{bmiResult}}</span></h3>
          <p class="category" [attr.data-category]="bmiCategory">{{bmiCategory}}</p>
          <div class="bmi-scale">
            <div class="scale-bar">
              <div class="indicator" [style.left.%]="(bmiResult / 40) * 100"></div>
            </div>
            <div class="scale-labels">
              <span>18.5</span>
              <span>25</span>
              <span>30</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Calorie Calculator -->
      <div class="calculator-content" *ngIf="activeTab === 'calories'">
        <div class="form-grid">
          <div class="input-group">
            <label>Genre</label>
            <select [(ngModel)]="calGender" (change)="calculateCalories()">
              <option value="male">Homme</option>
              <option value="female">Femme</option>
            </select>
          </div>
          <div class="input-group">
            <label>Âge</label>
            <input type="number" [(ngModel)]="calAge" placeholder="Ex: 25" (input)="calculateCalories()">
          </div>
          <div class="input-group">
            <label>Poids (kg)</label>
            <input type="number" [(ngModel)]="calWeight" placeholder="Ex: 70" (input)="calculateCalories()">
          </div>
          <div class="input-group">
            <label>Taille (cm)</label>
            <input type="number" [(ngModel)]="calHeight" placeholder="Ex: 175" (input)="calculateCalories()">
          </div>
          <div class="input-group full-width">
            <label>Niveau d'activité</label>
            <select [(ngModel)]="calActivity" (change)="calculateCalories()">
              <option [value]="1.2">Sédentaire (Bureau, peu d'exercice)</option>
              <option [value]="1.375">Légèrement actif (Exercice 1-3j/semaine)</option>
              <option [value]="1.55">Modérément actif (Exercice 3-5j/semaine)</option>
              <option [value]="1.725">Très actif (Exercice Intense 6-7j/semaine)</option>
              <option [value]="1.9">Extrêmement actif (Travail physique intense)</option>
            </select>
          </div>
        </div>

        <div class="result-card" *ngIf="calResult">
          <h3>Besoin Energétique journalier</h3>
          <div class="calories-value animate-pop">
            <span>{{calResult}}</span> kcal/jour
          </div>
          <p class="info-text">C'est le nombre de calories recommandées pour maintenir votre poids actuel.</p>
        </div>
      </div>
    </div>
  </div>
</div>
