<div class="rdvp-module">
  <!-- DECORATIVE BACKGROUND -->
  <div class="mood-bg-decor">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
  </div>

  <div class="booking-container">
    <div class="booking-card glass-card">
      <div class="booking-header">
        <h1 class="booking-title">Prendre Rendez-vous</h1>
        <p class="booking-sub">Planifiez votre prochaine séance de nutrition en quelques clics</p>
      </div>

      <div class="booking-body">
        <!-- ALERT MESSAGES -->
        <div class="alert" *ngIf="message" [ngClass]="'alert-' + message.type">
          <span class="alert-icon">
            <svg *ngIf="message.type === 'success'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
            <svg *ngIf="message.type === 'error'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
          </span>
          <p>{{ message.text }}</p>
        </div>

        <form (ngSubmit)="confirmRDV()" #rdvForm="ngForm">
          <div class="form-grid">
            <!-- NOM & PRENOM -->
            <div class="form-group">
              <label>Prénom</label>
              <input type="text" [(ngModel)]="prenom" name="prenom" required placeholder="Votre prénom">
            </div>
            <div class="form-group">
              <label>Nom</label>
              <input type="text" [(ngModel)]="nom" name="nom" required placeholder="Votre nom">
            </div>

            <!-- EMAIL -->
            <div class="form-group full">
              <label>Email de contact</label>
              <input type="email" [(ngModel)]="email" name="email" required placeholder="votre@email.com">
            </div>

            <!-- DATE SELECTOR -->
            <div class="form-group full">
              <label>Choisir une date</label>
              <div class="date-input-wrapper">
                <input type="date" [(ngModel)]="date_rdv" name="date_rdv" (change)="onDateChange()" required min="{{ today | date:'yyyy-MM-dd' }}">
                <span class="date-icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                </span>
              </div>
            </div>

            <!-- SLOT SELECTOR -->
            <div class="form-group full" *ngIf="date_rdv">
              <label>Horaires disponibles</label>
              <div class="slots-grid" *ngIf="availableSlots.length > 0">
                <div 
                  class="slot-card" 
                  *ngFor="let slot of availableSlots" 
                  [class.selected]="heure_rdv === slot"
                  (click)="selectSlot(slot)"
                >
                  {{ slot }}
                </div>
              </div>
              
              <div class="loading-state" *ngIf="isLoading">
                <div class="spinner"></div>
                <p>Chargement des disponibilités...</p>
              </div>

              <div class="no-slots" *ngIf="!isLoading && date_rdv && availableSlots.length === 0">
                <p>Aucun créneau disponible pour ce jour.</p>
              </div>
            </div>
          </div>

          <div class="booking-footer">
            <button type="submit" class="btn-confirm" [disabled]="!rdvForm.valid || !heure_rdv || isLoading">
              <span *ngIf="!isLoading">Confirmer le Rendez-vous</span>
              <span *ngIf="isLoading">Traitement en cours...</span>
              <svg *ngIf="!isLoading" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
