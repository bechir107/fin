<div class="layout">

  <!-- ═══════════════ SIDEBAR ═══════════════ -->
  <aside class="sidebar">

    <!-- Logo -->
    <div class="sidebar-logo">
      <div class="logo-icon">🌿</div>
      <div class="logo-text">
        Cabinet Mrad
        <small>Nutrition &amp; Bien-être</small>
      </div>
    </div>

    <!-- Patient identity card -->
    <div class="patient-mini-card">
      <div class="patient-avatar">{{ (nom || 'P')[0].toUpperCase() }}</div>
      <div class="patient-info">
        <div class="patient-name">{{ nom }} {{ prenom }}</div>
        <div class="patient-badge">🌱 Patient actif</div>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
      <p class="nav-section-label">Navigation</p>

      <a class="nav-item" routerLink="/espacep/rdvp" routerLinkActive="active">
        <span class="nav-icon">📅</span>
        <span class="nav-label">RDV</span>
      </a>

      <a class="nav-item" routerLink="/espacep/profil" routerLinkActive="active">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Mon profil</span>
      </a>

      <a class="nav-item" routerLink="/espacep/patientrdv" routerLinkActive="active">
        <span class="nav-icon">✉️</span>
        <span class="nav-label">Mes rendez-vous</span>
      </a>

    </nav>

    <!-- Footer -->
    <div class="sidebar-footer">

      <!-- Wellness tip chip -->
      <div class="sidebar-tip">
        <span class="tip-icon">💡</span>
        <div class="tip-text">
          <strong>Conseil du jour</strong>
          Buvez 1,5 à 2 L d'eau pour optimiser votre métabolisme.
        </div>
      </div>

      <button class="logout-btn" (click)="logout()">
        🚪 Déconnexion
      </button>

    </div>

  </aside>

  <!-- ═══════════════ MAIN ═══════════════ -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

</div>
