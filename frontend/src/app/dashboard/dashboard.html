<div class="app-container">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo-container">
      <div class="logo-circle">
        <i class="ph-leaf-fill"></i>
      </div>
      <span class="brand-name">farouk mrad</span>
    </div>

    <nav class="nav-menu">
      <a routerLink="/dashboard/stats" routerLinkActive="active" class="nav-item">
        <i class="ph-squares-four"></i> Tableau de bord
      </a>

     <!-- Menu Rendez-vous avec toggle au clic -->
<div class="nav-group">
  <a routerLink="/dashboard/rdv" routerLinkActive="active" (click)="toggleRdvSubmenu($event)" class="nav-item">
    <i class="ph-calendar"></i> 
    <span>Rendez-vous</span>
    <i class="ph-caret-down arrow-icon" [style.transform]="showRdvSubmenu ? 'rotate(180deg)' : 'rotate(0deg)'"></i>
  </a>
  
  <!-- Sous-menu lié au composant Calendrier -->
  <div class="submenu" *ngIf="showRdvSubmenu">
    <a routerLink="/dashboard/calendrier" routerLinkActive="submenu-active" class="submenu-item">
      <i class="ph-calendar-blank"></i> Calendrier
    </a>
  </div>
</div>

      <a routerLink="/dashboard/patient" routerLinkActive="active" class="nav-item">
        <i class="ph-users"></i> Patients
      </a>
      <a routerLink="/dashboard/consultation" routerLinkActive="active" class="nav-item">
        <i class="ph-stethoscope"></i> Consultation
      </a>
      <a class="nav-item">
        <i class="ph-apple-podcasts"></i> Plans alimentaires
      </a>
      <a class="nav-item">
        <i class="ph-chat-centered-dots"></i> Messagerie
      </a>
      <a class="nav-item">
        <i class="ph-gear"></i> Paramètres
      </a>
    </nav>

    <button class="logout-btn" (click)="logout()">
      <i class="ph-sign-out"></i> Déconnecter
    </button>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <header class="header">
      <h2 class="page-title">Tableau de bord global</h2>
      <div class="user-actions">
        <div class="search-bar">
          <i class="ph-magnifying-glass"></i>
          <input
            type="text"
            placeholder="Rechercher un patient..."
            [value]="searchQuery"
            (input)="onSearch($event)"
          >
        </div>
        <div class="notification-icon">
          <i class="ph-bell"></i>
          <span class="dot"></span>
        </div>
      </div>
    </header>

    <router-outlet></router-outlet>
  </main>
</div>
