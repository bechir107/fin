<div class="forgot-page">
  <div class="card-center">
    <div class="form-container">

      <div class="form-top">
        <a routerLink="/login" class="back-link">← Retour à la connexion</a>
        <div class="brand">
          <svg viewBox="0 0 48 48" fill="none" class="brand-icon">
            <path d="M10 38C10 38 14 18 36 10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M36 10C36 10 40 26 28 35C21 40 14 38 10 38" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <div class="brand-name">Dr. Farouk <em>Mrad</em></div>
        </div>
        <h2>Mot de passe oublié</h2>
        <p>Entrez votre e-mail pour recevoir votre mot de passe</p>
      </div>

      <!-- Formulaire -->
      <div *ngIf="!successMsg">
        <div class="field">
          <div class="field-label">
            <span>Adresse e-mail</span>
          </div>
          <div class="inp-wrap">
            <svg class="inp-icon" viewBox="0 0 20 20" fill="none">
              <rect x="2" y="4" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/>
              <path d="M2 7l8 5 8-5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            <input type="email" [(ngModel)]="email" placeholder="votre@email.com"
              autocomplete="email" (keyup.enter)="send()"/>
          </div>
        </div>

        <p class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</p>

        <button class="btn-main" (click)="send()" [disabled]="loading || !email">
          <span *ngIf="!loading" class="btn-inner">
            <svg viewBox="0 0 20 20" fill="none" width="18" height="18">
              <path d="M4 10h12M11 5l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
                stroke-linejoin="round"/>
            </svg>
            Envoyer
          </span>
          <span *ngIf="loading" class="loading-dots">
            <span></span><span></span><span></span>
          </span>
        </button>
      </div>

      <!-- Message succès -->
      <div class="success-box" *ngIf="successMsg">
        <svg viewBox="0 0 24 24" fill="none" width="48" height="48">
          <path d="M22 11.08V12a10 10 0 11-5.93-9.14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M22 4L12 14.01l-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <p>{{ successMsg }}</p>
        <a routerLink="/login" class="btn-main" style="text-decoration:none; text-align:center;">
          Retour à la connexion
        </a>
      </div>

    </div>
  </div>
</div>
